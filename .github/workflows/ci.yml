name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  milestone-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: qdd_test
          POSTGRES_USER: qdd
          POSTGRES_PASSWORD: qdd_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qdd -d qdd_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8.4-alpine
        ports:
          - 6379:6379
    env:
      ADMIN_PASSWORD: CorrectHorse!2026
      ADMIN_USERNAME: admin
      DATABASE_URL: postgresql://qdd:qdd_test_password@localhost:5432/qdd_test?schema=public
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-session-secret-change-me
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Seed database
        run: pnpm db:seed

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @qdd/e2e exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm e2e
