services:
  api:
    command: ["pnpm", "--filter", "@qdd/api", "start"]
    environment:
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required in production}
    restart: unless-stopped

  worker:
    command: ["pnpm", "--filter", "@qdd/api", "worker:start"]
    environment:
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required in production}
    restart: unless-stopped

  web:
    command: ["pnpm", "--filter", "@qdd/web", "preview", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      NODE_ENV: production
    restart: unless-stopped

  reverse-proxy:
    image: caddy:2-alpine
    profiles: ["prod"]
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  caddy-config:
  caddy-data:
