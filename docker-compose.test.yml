name: qian-duo-duo-test

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: qdd_test
      POSTGRES_USER: qdd
      POSTGRES_PASSWORD: qdd_test_password
    ports:
      - "${POSTGRES_TEST_PORT:-55432}:5432"
    tmpfs:
      - /var/lib/postgresql

  redis:
    image: redis:8.4-alpine
    ports:
      - "${REDIS_TEST_PORT:-56379}:6379"
    tmpfs:
      - /data
