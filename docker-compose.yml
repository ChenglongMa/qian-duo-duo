name: qian-duo-duo

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qdd_dev}
      POSTGRES_USER: ${POSTGRES_USER:-qdd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qdd_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:8.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      API_PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://qdd:qdd_dev_password@postgres:5432/qdd_dev?schema=public}
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - attachments-data:/var/lib/qdd/attachments

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: ["pnpm", "--filter", "@qdd/api", "worker:dev"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://qdd:qdd_dev_password@postgres:5432/qdd_dev?schema=public}
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - attachments-data:/var/lib/qdd/attachments
      - backup-data:/var/lib/qdd/backups

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${WEB_PORT:-5173}:5173"

volumes:
  attachments-data:
  backup-data:
  postgres-data:
  redis-data:
